<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#176044" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="HomeGame" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>HomeGame</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="join" class="join-screen">
        <div class="brand">HomeGame</div>
        <div class="join-panel">
          <div class="account-panel">
            <div id="accountStatus" class="account-status">未登录</div>
            <label>
              账号
              <input id="accountUsername" autocomplete="username" placeholder="3-24 位字母、数字、下划线" />
            </label>
            <label>
              密码
              <input id="accountPassword" type="password" autocomplete="current-password" placeholder="至少 6 位" />
            </label>
            <label class="remember-password" title="下次打开自动填写并登录">
              <input id="rememberPassword" type="checkbox" />
              <span>记住密码</span>
            </label>
            <div class="account-actions">
              <button id="loginAccount" type="button">登录</button>
              <button id="registerAccount" type="button" class="secondary">注册</button>
              <button id="logoutAccount" type="button" class="secondary">退出</button>
            </div>
          </div>
          <label>
            昵称
            <input id="name" maxlength="16" autocomplete="nickname" placeholder="你的名字" />
          </label>
          <label>
            房间码
            <input id="code" maxlength="5" autocapitalize="characters" placeholder="例如 A7KQ2" />
          </label>
          <label>
            服务器地址
            <input id="serverUrl" inputmode="url" autocomplete="url" placeholder="例如 https://poker.example.com" />
          </label>
          <div class="join-actions">
            <button id="create">创建房间</button>
            <button id="joinRoom" class="secondary">加入房间</button>
          </div>
          <p id="joinError" class="error"></p>
        </div>
      </section>

      <section id="table" class="table-screen hidden">
        <div class="rotate-tip">
          <div>竖屏可用，横屏更宽</div>
          <span>横屏后牌桌和操作按钮会自动展开</span>
        </div>
        <header class="topbar">
          <div>
            <span class="room-label">房间</span>
            <button id="copyCode" class="room-code" title="复制房间链接"></button>
          </div>
          <div class="lobby-actions">
            <button id="muteToggle" class="mute-btn" title="静音切换">有声</button>
            <button id="voiceToggle" class="voice-btn" title="语音聊天">语音</button>
            <button id="leaveRoom" class="leave-btn" title="退出房间">退出</button>
            <button id="modeToggle" class="mode-btn">常规</button>
            <input id="botBuyInAmount" class="bot-buy-input" type="number" min="1" step="1" title="输入人机筹码量" aria-label="输入人机筹码量" placeholder="输入人机筹码量" />
            <button id="addBot" class="bot-btn">加人机</button>
            <button id="ready" class="start-btn">准备</button>
          </div>
        </header>

        <section class="felt">
          <div id="players" class="players"></div>
          <div class="center">
            <div id="community" class="community"></div>
            <div class="pot">底池 <strong id="pot">0</strong></div>
            <div id="rewardPool" class="reward-pool hidden">鱿鱼池 <strong>0</strong></div>
            <div id="message" class="message">等待玩家加入</div>
          </div>
        </section>

        <section class="controls">
          <div class="bet-row">
            <label for="raiseAmount">下注</label>
            <input id="raiseAmount" type="number" min="0" step="1" value="0" />
          </div>
          <div class="action-row">
            <button id="fold" class="danger">弃牌</button>
            <button id="checkCall">过牌</button>
            <button id="raise">下注</button>
            <button id="allIn" class="gold">全下</button>
          </div>
          <div class="buy-panel">
            <label for="buyAmount">买入</label>
            <input id="buyAmount" type="number" min="1" step="1" value="100" />
            <button id="systemBuy">系统买入</button>
            <select id="buyTarget" aria-label="选择买入对象"></select>
            <button id="requestBuy">申请买入</button>
          </div>
          <div id="buyRequests" class="buy-requests"></div>
        </section>

        <div id="runoutDialog" class="runout-dialog hidden">
          <div class="runout-panel">
            <strong>双方全下</strong>
            <span>两个人都选择发两次才会发两次</span>
            <div class="runout-actions">
              <button id="runoutOnce">发一次</button>
              <button id="runoutTwice" class="gold">发两次</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="/vendor/socket.io.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
